name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format check
        run: bun run check

      - name: Test
        run: bun test

  build:
    name: build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build

      - name: Compile standalone binary
        run: bun run build:compile

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - ./dist/ergo

      - name: Smoke test the binary (unix)
        if: runner.os != 'Windows'
        run: ./dist/ergo --version

      - name: Smoke test the binary (windows)
        if: runner.os == 'Windows'
        run: ./dist/ergo.exe --version
